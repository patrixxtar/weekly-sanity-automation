<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Automation Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            background: #121212; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden; /* Prevents scrollbars */
            padding-bottom: 60px;
            box-sizing: border-box;
        }
        h2 { 
            margin: 10px 0; 
            text-align: center; 
            font-size: 1.2rem;
        }
        video { 
            flex: 1; /* Makes the video take up all remaining space */
            width: 100%; 
            height: 100%;
            object-fit: contain; /* Keeps aspect ratio and fits inside container */
            background: #000;
        }
    </style>
</head>
<body>
    <h2>Live Automation Run</h2>
    <video id="video" controls autoplay muted playsinline></video>
    
    <script>
        var video = document.getElementById('video');
        var hls = null;

        function startPlayer() {
            // Destroy existing player if it exists to avoid memory leaks
            if (hls) {
                hls.destroy();
            }

            // Cache-busting URL to ensure we get the fresh file
            var videoSrc = 'stream.m3u8?t=' + Date.now();

            if (Hls.isSupported()) {
                hls = new Hls({
                    liveSyncDurationCount: 1,
                    liveMaxLatencyDurationCount: 2,
                    maxBufferLength: 2,
                    lowLatencyMode: true,
                    catchup: true
                });

                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    console.log("Stream successfully loaded.");
                });

                // --- THE MAGIC: Auto-Reconnect Logic ---
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.log("Stream lost (likely test finished). Retrying in 3 seconds...");
                        // Wait 3 seconds, then try to initialize again
                        setTimeout(startPlayer, 3000); 
                    }
                });
            }
        }

        // Start the loop
        startPlayer();
    </script>
</body>
</html>
